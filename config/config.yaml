# Mail Digest configuration

schedule:
  run_hour: 18
  run_minute: 0
  window_hours: 24

ai:
  provider: claude  # claude | cursor
  claude_bin: claude
  cursor_bin: agent
  timeout_seconds: 300
  max_body_chars_per_email: 12000
  openrouter:
    enabled: true
    base_url: https://openrouter.ai/api
    disable_nonessential_traffic: true
    model: openai/gpt-4o-mini
    # Or use GPT-4.1 mini: openai/gpt-4.1-mini
    # Per-tier overrides (optional; fall back to model above):
    # default_sonnet_model: openai/gpt-4o-mini
    # default_opus_model: openai/gpt-4o-mini
    # default_haiku_model: openai/gpt-4o-mini

gmail:
  credentials_file: credentials.json
  token_file: token.json
  scopes:
    - https://www.googleapis.com/auth/gmail.modify
  broad_query: "in:inbox newer_than:2d"
  inbox_cleanup_query: "in:inbox"
  inbox_cleanup_enabled: true
  mark_read_after_save: true
  trash_after_save: true

paths:
  emails: emails
  daily_reports: daily_reports
  weekly_reports: weekly_reports
  monthly_reports: monthly_report
  email_retention_days: 0  # 0 = keep local archives forever

slack:
  max_bullets_per_section: 5
  max_chars_per_block: 2900
